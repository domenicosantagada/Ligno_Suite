<!-- Div contenitore generale con stili personalizzati -->
<div class="login-wrapper">

  <!-- Card principale del login -->
  <!-- Stili importati da bootstrap -->
  <div class="card shadow-sm border-0 rounded-4 login-card">

    <!-- card-body con p-5 per dare spazio interno -->
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h4 class="fw-bold text-dark">Crea un Account</h4>
      </div>

      <!-- Controllo se l'errore non è vuoto-->
      <!-- Altrimenti mostra un messaggio di errore -->
      @if (errore) {
        <div class="alert alert-danger py-2 small">{{ errore }}</div>
      }


      <!-- Reactive Form collegato al FormGroup registerForm -->
      <!-- ngSubmit intercetta il submit e richiama onSubmit() -->
      <form (ngSubmit)="onSubmit()" [formGroup]="registerForm">

        <!-- Campo Nome/Azienda collegato al FormControl "nome" -->
        <div class="mb-3">
          <label class="form-label text-muted small fw-bold">
            Nome / Azienda
          </label>
          <input class="form-control bg-light border-0 text-capitalize"
                 formControlName="nome"
                 placeholder="Il tuo nome"
                 type="text">
        </div>

        <!-- Campo Email collegato al FormControl "email" -->
        <div class="mb-3">
          <label class="form-label text-muted small fw-bold">
            Email
          </label>
          <input class="form-control bg-light border-0 text-lowercase"
                 formControlName="email"
                 placeholder="Inserisci la tua email"
                 type="email">
        </div>

        <!-- Campo Password collegato al FormControl "password" -->
        <div class="mb-4">
          <label class="form-label text-muted small fw-bold">
            Password
          </label>
          <input class="form-control bg-light border-0"
                 formControlName="password"
                 placeholder="Scegli una password"
                 type="password">
        </div>

        <!-- Pulsante disabilitato finché il form non è valido -->
        <button [disabled]="registerForm.invalid"
                class="btn btn-dark btn-lg w-100 rounded-pill mb-3"
                type="submit">
          Registrati
        </button>

        <!-- Navigazione verso login tramite Angular Router -->
        <div class="text-center small">
          Hai già un account?
          <a class="text-dark fw-bold text-decoration-none"
             routerLink="/login">
            Accedi qui
          </a>
        </div>

      </form>
    </div>
  </div>
</div>
